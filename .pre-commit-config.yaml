repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.10
    hooks:
      - id: ruff-format
        args: [--check]
        files: ^(backend|shared|sdk)/
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
        files: ^(backend|shared|sdk)/

  - repo: local
    hooks:
      - id: mypy
        name: mypy
        entry: bash -c 'unset VIRTUAL_ENV && cd backend && uv run mypy --strict app/'
        language: system
        pass_filenames: false
        files: ^backend/
        types: [python]

      - id: pytest
        name: pytest
        entry: bash -c 'unset VIRTUAL_ENV && cd backend && uv run python -m pytest -m "not integration" -x -q --cov=app --cov-fail-under=70 --cov-report=term-missing'
        language: system
        pass_filenames: false
        files: ^backend/
        always_run: true
