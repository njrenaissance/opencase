repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.10
    hooks:
      - id: ruff-format
        args: [--check]
        files: ^(backend|shared|sdk|cli)/
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
        files: ^(backend|shared|sdk|cli)/

  - repo: local
    hooks:
      - id: mypy-backend
        name: mypy (backend)
        entry: bash -c 'unset VIRTUAL_ENV && cd backend && uv run mypy app/'
        language: system
        pass_filenames: false
        files: ^backend/
        types: [python]

      - id: mypy-shared
        name: mypy (shared)
        entry: bash -c 'unset VIRTUAL_ENV && cd shared && uv run mypy shared/'
        language: system
        pass_filenames: false
        files: ^shared/
        types: [python]

      - id: mypy-sdk
        name: mypy (sdk)
        entry: bash -c 'unset VIRTUAL_ENV && cd sdk && uv run mypy gideon/'
        language: system
        pass_filenames: false
        files: ^sdk/
        types: [python]

      - id: pytest-backend
        name: pytest (backend)
        entry: bash -c 'unset VIRTUAL_ENV && cd backend && uv run python -m pytest -m "not integration" -x -q --cov=app --cov-fail-under=70 --cov-report=term-missing'
        language: system
        pass_filenames: false
        files: ^backend/
        always_run: true

      - id: pytest-shared
        name: pytest (shared)
        entry: bash -c 'unset VIRTUAL_ENV && cd shared && uv run python -m pytest -x -q'
        language: system
        pass_filenames: false
        files: ^shared/

      - id: pytest-sdk
        name: pytest (sdk)
        entry: bash -c 'unset VIRTUAL_ENV && cd sdk && uv run python -m pytest -x -q --cov=gideon --cov-report=term-missing'
        language: system
        pass_filenames: false
        files: ^sdk/

      - id: mypy-cli
        name: mypy (cli)
        entry: bash -c 'unset VIRTUAL_ENV && cd cli && uv run mypy gideon_cli/'
        language: system
        pass_filenames: false
        files: ^cli/
        types: [python]

      - id: pytest-cli
        name: pytest (cli)
        entry: bash -c 'unset VIRTUAL_ENV && cd cli && uv run python -m pytest -x -q --cov=gideon_cli --cov-report=term-missing'
        language: system
        pass_filenames: false
        files: ^cli/
