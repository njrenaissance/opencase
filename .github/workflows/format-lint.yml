name: Lint & Format

on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    name: Ruff Lint & Format
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Cache uv
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-uv-${{ hashFiles('uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-uv-

      - name: Install dependencies
        run: uv sync --frozen

      - name: Check formatting — backend
        working-directory: backend
        run: uv run ruff format --check .

      - name: Run linter — backend
        working-directory: backend
        run: uv run ruff check .

      - name: Run type checker — backend
        working-directory: backend
        run: uv run mypy app/

      - name: Check formatting — shared
        working-directory: shared
        run: uv run ruff format --check .

      - name: Run linter — shared
        working-directory: shared
        run: uv run ruff check .

      - name: Run type checker — shared
        working-directory: shared
        run: uv run mypy shared/

      - name: Check formatting — sdk
        working-directory: sdk
        run: uv run ruff format --check .

      - name: Run linter — sdk
        working-directory: sdk
        run: uv run ruff check .

      - name: Run type checker — sdk
        working-directory: sdk
        run: uv run mypy opencase/

      - name: Check formatting — cli
        working-directory: cli
        run: uv run ruff format --check .

      - name: Run linter — cli
        working-directory: cli
        run: uv run ruff check .

      - name: Run type checker — cli
        working-directory: cli
        run: uv run mypy opencase_cli/
