name: AI Code Review

on:
  pull_request:
    types: [opened, synchronize]
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to review"
        required: true
        type: number

permissions:
  contents: read
  pull-requests: write

jobs:
  ai-review:
    uses: njrenaissance/pr-review-agent/.github/workflows/ai-code-review.yml@1.0.0
    secrets:
      anthropic-api-key: ${{ secrets.ANTHROPIC_API_KEY }}