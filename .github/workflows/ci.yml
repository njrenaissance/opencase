name: CI Pipeline

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "**.md"
      - ".claude/**"

permissions:
  contents: read
  pull-requests: write

jobs:
  lint:
    name: Lint & Format
    uses: ./.github/workflows/format-lint.yml

  unit-tests:
    name: Unit Tests
    needs: [lint]
    uses: ./.github/workflows/unit-tests.yml
