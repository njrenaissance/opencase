name: CI Pipeline

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "**.md"
      - ".claude/**"

permissions:
  contents: read
  packages: write
  pull-requests: write

jobs:
  lint:
    name: Lint & Format
    uses: ./.github/workflows/format-lint.yml

  unit-tests:
    name: Unit Tests
    needs: [lint]
    uses: ./.github/workflows/unit-tests.yml

  build-container:
    name: Build Container
    needs: [unit-tests]
    uses: ./.github/workflows/build-container.yml
    permissions:
      contents: read
      packages: write
    secrets: inherit
