# Load environment from project root:
#   docker compose -f infrastructure/docker-compose.yml --env-file .env up

name: opencase

services:

  # --- UI & Proxy -------------------------------------------
  # Disabled until frontend implementation begins. Re-enable by removing
  # the profiles line or running: docker compose --profile frontend up
  nextjs:
    profiles: [frontend]
    build:
      context: ../frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:3000/api
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - NEXTAUTH_URL=http://localhost:3000
      - FASTAPI_UPSTREAM=http://fastapi:8000
    depends_on:
      - fastapi
    networks:
      - opencase
    restart: unless-stopped

  # --- Database Migrations ------------------------------------
  # Runs `alembic upgrade head` then exits. Admin seeding has moved
  # to the FastAPI lifespan hook (OPENCASE_ADMIN_* env vars).
  db-migrate:
    build:
      context: ..
      dockerfile: backend/docker/Dockerfile
    command: ["true"]
    environment:
      - OPENCASE_DB_URL=postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      # AUTH_SECRET_KEY and S3 credentials are required because importing
      # app.core.config validates them, even though this container only
      # runs migrations.
      - OPENCASE_AUTH_SECRET_KEY=${OPENCASE_AUTH_SECRET_KEY}
      - OPENCASE_S3_ACCESS_KEY=${OPENCASE_S3_ACCESS_KEY:-opencase}
      - OPENCASE_S3_SECRET_KEY=${OPENCASE_S3_SECRET_KEY:-changeme}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - opencase
    restart: "no"

  # --- API Layer --------------------------------------------
  fastapi:
    build:
      context: ..
      dockerfile: backend/docker/Dockerfile
    expose:
      - "8000"
    # Host port mapping for local development and integration tests.
    # In production, remove this — FastAPI is never exposed on a public port;
    # all external traffic routes through Next.js.
    ports:
      - "8000:8000"
    environment:
      - OPENCASE_API_HOST=${OPENCASE_API_HOST:-0.0.0.0}
      - OPENCASE_API_PORT=${OPENCASE_API_PORT:-8000}
      - OPENCASE_LOG_LEVEL=${OPENCASE_LOG_LEVEL:-INFO}
      - OPENCASE_LOG_OUTPUT=${OPENCASE_LOG_OUTPUT:-stdout}
      - OPENCASE_DB_URL=postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - OPENCASE_AUTH_SECRET_KEY=${OPENCASE_AUTH_SECRET_KEY}
      - OPENCASE_DEPLOYMENT_MODE=${DEPLOYMENT_MODE:-airgapped}
      - OPENCASE_CELERY_BROKER_URL=redis://redis:6379/0
      - OPENCASE_CELERY_RESULT_BACKEND=db+postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/opencase_tasks
      - REDIS_URL=redis://redis:6379/0
      # Embedding
      - OPENCASE_EMBEDDING_MODEL=${OPENCASE_EMBEDDING_MODEL:-nomic-embed-text}
      - OPENCASE_EMBEDDING_BASE_URL=${OPENCASE_EMBEDDING_BASE_URL:-http://ollama:11434}
      # Qdrant
      - OPENCASE_QDRANT_HOST=${OPENCASE_QDRANT_HOST:-qdrant}
      - OPENCASE_QDRANT_PORT=${OPENCASE_QDRANT_PORT:-6333}
      - OPENCASE_QDRANT_COLLECTION=${OPENCASE_QDRANT_COLLECTION:-opencase}
      # LLM (future settings class)
      - OLLAMA_LLM_MODEL=${OLLAMA_LLM_MODEL:-llama3:8b}
      - OPENCASE_S3_ENDPOINT=${OPENCASE_S3_ENDPOINT:-minio:9000}
      - OPENCASE_S3_ACCESS_KEY=${OPENCASE_S3_ACCESS_KEY:-opencase}
      - OPENCASE_S3_SECRET_KEY=${OPENCASE_S3_SECRET_KEY:-changeme}
      - OPENCASE_S3_BUCKET=${OPENCASE_S3_BUCKET:-opencase}
      - OPENCASE_S3_USE_SSL=${OPENCASE_S3_USE_SSL:-false}
      - OPENCASE_S3_REGION=${OPENCASE_S3_REGION:-us-east-1}
      - OPENCASE_OTEL_ENABLED=${OPENCASE_OTEL_ENABLED:-false}
      - OPENCASE_OTEL_EXPORTER=${OPENCASE_OTEL_EXPORTER:-console}
      - OPENCASE_OTEL_ENDPOINT=${OPENCASE_OTEL_ENDPOINT:-http://grafana:4318}
      - OPENCASE_OTEL_SERVICE_NAME=${OPENCASE_OTEL_SERVICE_NAME:-opencase-api}
      - OPENCASE_OTEL_SAMPLE_RATE=${OPENCASE_OTEL_SAMPLE_RATE:-1.0}
      # Admin seed (lifespan hook — runs once on startup, idempotent)
      - OPENCASE_ADMIN_EMAIL=${OPENCASE_ADMIN_EMAIL:-}
      - OPENCASE_ADMIN_PASSWORD=${OPENCASE_ADMIN_PASSWORD:-}
      - OPENCASE_ADMIN_FIRST_NAME=${OPENCASE_ADMIN_FIRST_NAME:-Admin}
      - OPENCASE_ADMIN_LAST_NAME=${OPENCASE_ADMIN_LAST_NAME:-User}
      - OPENCASE_ADMIN_FIRM_NAME=${OPENCASE_ADMIN_FIRM_NAME:-Default Firm}
    depends_on:
      db-migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      qdrant-init:
        condition: service_completed_successfully
      ollama-init:
        condition: service_completed_successfully
    networks:
      - opencase
    restart: unless-stopped

  # --- Observability (traces + metrics + logs) -------------
  grafana:
    image: grafana/otel-lgtm:latest
    ports:
      - "3001:3000"    # Grafana UI
      - "4317:4317"    # OTLP gRPC receiver
      - "4318:4318"    # OTLP HTTP receiver
    volumes:
      - grafana-data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - opencase
    restart: unless-stopped

  # --- Document Object Storage ------------------------------
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    expose:
      - "9000"
      - "9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=${OPENCASE_S3_ACCESS_KEY:-opencase}
      - MINIO_ROOT_PASSWORD=${OPENCASE_S3_SECRET_KEY:-changeme}
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - opencase
    restart: unless-stopped

  # One-shot init: create the default bucket if it does not exist.
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    environment:
      - MINIO_ROOT_USER=${OPENCASE_S3_ACCESS_KEY:-opencase}
      - MINIO_ROOT_PASSWORD=${OPENCASE_S3_SECRET_KEY:-changeme}
      - MINIO_BUCKET=${OPENCASE_S3_BUCKET:-opencase}
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD;
      mc mb --ignore-existing local/$$MINIO_BUCKET;
      "
    networks:
      - opencase
    restart: "no"

  # --- Document Text Extraction -------------------------------
  tika:
    image: apache/tika:3.1.0.0
    expose:
      - "9998"
    healthcheck:
      test: ["CMD", "perl", "-e", "use IO::Socket::INET; my $$s = IO::Socket::INET->new(PeerAddr=>'localhost',PeerPort=>9998,Proto=>'tcp',Timeout=>2) or exit 1; print $$s \"GET /tika HTTP/1.0\\r\\nHost: localhost\\r\\n\\r\\n\"; my $$r = <$$s>; exit($$r =~ /200/ ? 0 : 1);"]
      start_period: 30s
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - opencase
    restart: unless-stopped

  # --- Local LLM + Embeddings ------------------------------
  ollama:
    image: ollama/ollama:latest
    expose:
      - "11434"
    volumes:
      - ollama-models:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - opencase
    restart: unless-stopped
    # GPU support: uncomment below for NVIDIA GPU acceleration
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  # One-shot init: pull the embedding model if not already present.
  # LLM model pull is skipped for now (too large for dev/test).
  ollama-init:
    image: ollama/ollama:latest
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - EMBEDDING_MODEL=${OPENCASE_EMBEDDING_MODEL:-nomic-embed-text}
    entrypoint: >
      /bin/sh -c "
      echo 'Pulling embedding model $$EMBEDDING_MODEL...';
      ollama pull $$EMBEDDING_MODEL;
      echo 'Model pull complete.';
      "
    networks:
      - opencase
    restart: "no"

  # --- Relational Database ----------------------------------
  postgres:
    image: postgres:17-alpine
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-opencase}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-changeme}
      - POSTGRES_DB=${POSTGRES_DB:-opencase}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-opencase}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - opencase
    restart: unless-stopped

  # --- Vector Store -----------------------------------------
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "${QDRANT_PORT:-6333}:6333"
      - "${QDRANT_GRPC_PORT:-6334}:6334"
    volumes:
      - qdrant-data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/6333'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - opencase
    restart: unless-stopped

  # One-shot init: create the default Qdrant collection if it does not exist.
  qdrant-init:
    image: curlimages/curl:latest
    depends_on:
      qdrant:
        condition: service_healthy
    environment:
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - COLLECTION_NAME=${OPENCASE_QDRANT_COLLECTION:-opencase}
      - EMBEDDING_DIMENSIONS=${OPENCASE_EMBEDDING_DIMENSIONS:-768}
    entrypoint:
      - /bin/sh
      - -c
      - |
        echo "Checking collection $$COLLECTION_NAME..."
        HTTP_CODE=$$(curl -sf -o /dev/null -w '%{http_code}' http://$$QDRANT_HOST:$$QDRANT_PORT/collections/$$COLLECTION_NAME)
        if [ "$$HTTP_CODE" = "200" ]; then
          echo "Collection already exists — skipping."; exit 0
        fi
        echo "Creating collection (dimensions=$$EMBEDDING_DIMENSIONS)..."
        curl -sf -X PUT "http://$$QDRANT_HOST:$$QDRANT_PORT/collections/$$COLLECTION_NAME" -H "Content-Type: application/json" -d "{\"vectors\":{\"size\":$$EMBEDDING_DIMENSIONS,\"distance\":\"Cosine\"}}" || exit 1
        echo "Done."
    networks:
      - opencase
    restart: "no"

  # --- Task Queue Broker ------------------------------------
  redis:
    image: redis:7-alpine
    expose:
      - "6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - opencase
    restart: unless-stopped

  # --- Background Workers -----------------------------------
  celery-worker:
    build:
      context: ..
      dockerfile: backend/docker/Dockerfile
    command: celery -A app.workers worker -l info
    environment:
      - SKIP_MIGRATIONS=true
      - OPENCASE_AUTH_SECRET_KEY=${OPENCASE_AUTH_SECRET_KEY}
      - OPENCASE_DB_URL=postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - OPENCASE_CELERY_BROKER_URL=redis://redis:6379/0
      - OPENCASE_CELERY_RESULT_BACKEND=db+postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/opencase_tasks
      - OPENCASE_LOG_LEVEL=${OPENCASE_LOG_LEVEL:-INFO}
      - OPENCASE_LOG_OUTPUT=${OPENCASE_LOG_OUTPUT:-stdout}
      - OPENCASE_DEPLOYMENT_MODE=${DEPLOYMENT_MODE:-airgapped}
      # Embedding
      - OPENCASE_EMBEDDING_MODEL=${OPENCASE_EMBEDDING_MODEL:-nomic-embed-text}
      - OPENCASE_EMBEDDING_BASE_URL=${OPENCASE_EMBEDDING_BASE_URL:-http://ollama:11434}
      # Qdrant
      - OPENCASE_QDRANT_HOST=${OPENCASE_QDRANT_HOST:-qdrant}
      - OPENCASE_QDRANT_PORT=${OPENCASE_QDRANT_PORT:-6333}
      - OPENCASE_QDRANT_COLLECTION=${OPENCASE_QDRANT_COLLECTION:-opencase}
      - OPENCASE_S3_ENDPOINT=${OPENCASE_S3_ENDPOINT:-minio:9000}
      - OPENCASE_S3_ACCESS_KEY=${OPENCASE_S3_ACCESS_KEY:-opencase}
      - OPENCASE_S3_SECRET_KEY=${OPENCASE_S3_SECRET_KEY:-changeme}
      - OPENCASE_S3_BUCKET=${OPENCASE_S3_BUCKET:-opencase}
      - OPENCASE_S3_USE_SSL=${OPENCASE_S3_USE_SSL:-false}
      - OPENCASE_S3_REGION=${OPENCASE_S3_REGION:-us-east-1}
      # Document extraction (Tika)
      - OPENCASE_EXTRACTION_TIKA_URL=${OPENCASE_EXTRACTION_TIKA_URL:-http://tika:9998}
      # Cloud ingestion (internet mode only)
      - AZURE_CLIENT_ID=${AZURE_CLIENT_ID:-}
      - AZURE_CLIENT_SECRET=${AZURE_CLIENT_SECRET:-}
      - AZURE_TENANT_ID=${AZURE_TENANT_ID:-}
      # Observability
      - OPENCASE_OTEL_ENABLED=${OPENCASE_OTEL_ENABLED:-false}
      - OPENCASE_OTEL_EXPORTER=${OPENCASE_OTEL_EXPORTER:-console}
      - OPENCASE_OTEL_ENDPOINT=${OPENCASE_OTEL_ENDPOINT:-http://grafana:4318}
      - OPENCASE_OTEL_SERVICE_NAME=opencase-worker
      - OPENCASE_OTEL_SAMPLE_RATE=${OPENCASE_OTEL_SAMPLE_RATE:-1.0}
    volumes:
      - celery-tmp:/tmp/celery
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      tika:
        condition: service_healthy
      qdrant-init:
        condition: service_completed_successfully
      ollama-init:
        condition: service_completed_successfully
    networks:
      - opencase
    restart: unless-stopped

  celery-beat:
    build:
      context: ..
      dockerfile: backend/docker/Dockerfile
    command: celery -A app.workers beat -l info --schedule /tmp/celery/celerybeat-schedule
    environment:
      - SKIP_MIGRATIONS=true
      - OPENCASE_AUTH_SECRET_KEY=${OPENCASE_AUTH_SECRET_KEY}
      # OPENCASE_DB_URL and S3 credentials are required because importing
      # app.core.config validates them, even though Beat only uses
      # broker_url and result_backend.
      - OPENCASE_DB_URL=postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - OPENCASE_S3_ACCESS_KEY=${OPENCASE_S3_ACCESS_KEY:-opencase}
      - OPENCASE_S3_SECRET_KEY=${OPENCASE_S3_SECRET_KEY:-changeme}
      - OPENCASE_CELERY_BROKER_URL=redis://redis:6379/0
      - OPENCASE_CELERY_RESULT_BACKEND=db+postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/opencase_tasks
      - OPENCASE_LOG_LEVEL=${OPENCASE_LOG_LEVEL:-INFO}
      - OPENCASE_LOG_OUTPUT=${OPENCASE_LOG_OUTPUT:-stdout}
      # Observability
      - OPENCASE_OTEL_ENABLED=${OPENCASE_OTEL_ENABLED:-false}
      - OPENCASE_OTEL_EXPORTER=${OPENCASE_OTEL_EXPORTER:-console}
      - OPENCASE_OTEL_ENDPOINT=${OPENCASE_OTEL_ENDPOINT:-http://grafana:4318}
      - OPENCASE_OTEL_SERVICE_NAME=opencase-beat
      - OPENCASE_OTEL_SAMPLE_RATE=${OPENCASE_OTEL_SAMPLE_RATE:-1.0}
    volumes:
      - celery-tmp:/tmp/celery
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - opencase
    restart: unless-stopped

  # --- Monitoring --------------------------------------------
  flower:
    build:
      context: ..
      dockerfile: backend/docker/Dockerfile
      args:
        INSTALL_EXTRAS: monitoring
    command: celery -A app.workers flower --port=5555 --url_prefix=/flower
    ports:
      - "${OPENCASE_FLOWER_PORT:-5555}:5555"
    environment:
      - SKIP_MIGRATIONS=true
      - OPENCASE_AUTH_SECRET_KEY=${OPENCASE_AUTH_SECRET_KEY}
      # Required by app.core.config validation even though Flower only
      # uses broker_url and result_backend.
      - OPENCASE_DB_URL=postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - OPENCASE_S3_ACCESS_KEY=${OPENCASE_S3_ACCESS_KEY:-opencase}
      - OPENCASE_S3_SECRET_KEY=${OPENCASE_S3_SECRET_KEY:-changeme}
      - OPENCASE_CELERY_BROKER_URL=redis://redis:6379/0
      - OPENCASE_CELERY_RESULT_BACKEND=db+postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/opencase_tasks
      - OPENCASE_FLOWER_PORT=5555
      - OPENCASE_FLOWER_BASIC_AUTH=${OPENCASE_FLOWER_BASIC_AUTH:-}
      - OPENCASE_FLOWER_URL_PREFIX=/flower
      - OPENCASE_LOG_LEVEL=${OPENCASE_LOG_LEVEL:-INFO}
      - OPENCASE_LOG_OUTPUT=${OPENCASE_LOG_OUTPUT:-stdout}
      # Flower is a monitoring UI — no task telemetry to emit.
      - OPENCASE_OTEL_ENABLED=false
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - opencase
    restart: unless-stopped

volumes:
  postgres-data:
  qdrant-data:
  redis-data:
  ollama-models:
  minio-data:
  celery-tmp:
  grafana-data:

networks:
  opencase:
    driver: bridge
