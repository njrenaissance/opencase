# Load environment from project root:
#   docker compose -f infrastructure/docker-compose.yml --env-file .env up

name: opencase

services:

  # --- UI & Proxy -------------------------------------------
  nextjs:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:3000/api
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - NEXTAUTH_URL=http://localhost:3000
      - FASTAPI_UPSTREAM=http://fastapi:8000
    depends_on:
      - fastapi
    networks:
      - opencase
    restart: unless-stopped

  # --- Database Migrations ------------------------------------
  # Runs `alembic upgrade head` then exits. Admin seeding has moved
  # to the FastAPI lifespan hook (OPENCASE_ADMIN_* env vars).
  db-migrate:
    build:
      context: ..
      dockerfile: backend/docker/Dockerfile
    command: ["true"]
    environment:
      - OPENCASE_DB_URL=postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      # AUTH_SECRET_KEY is required because importing app.core.config
      # validates it, even though this container only runs migrations.
      - OPENCASE_AUTH_SECRET_KEY=${OPENCASE_AUTH_SECRET_KEY}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - opencase
    restart: "no"

  # --- API Layer --------------------------------------------
  fastapi:
    build:
      context: ..
      dockerfile: backend/docker/Dockerfile
    expose:
      - "8000"
    # Host port mapping for local development and integration tests.
    # In production, remove this — FastAPI is never exposed on a public port;
    # all external traffic routes through Next.js.
    ports:
      - "8000:8000"
    environment:
      - OPENCASE_API_HOST=${OPENCASE_API_HOST:-0.0.0.0}
      - OPENCASE_API_PORT=${OPENCASE_API_PORT:-8000}
      - OPENCASE_LOG_LEVEL=${OPENCASE_LOG_LEVEL:-INFO}
      - OPENCASE_LOG_OUTPUT=${OPENCASE_LOG_OUTPUT:-stdout}
      - OPENCASE_DB_URL=postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - OPENCASE_AUTH_SECRET_KEY=${OPENCASE_AUTH_SECRET_KEY}
      - OPENCASE_DEPLOYMENT_MODE=${DEPLOYMENT_MODE:-airgapped}
      - REDIS_URL=redis://redis:6379/0
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - QDRANT_COLLECTION=opencase
      - OLLAMA_HOST=http://ollama:11434
      - OLLAMA_LLM_MODEL=${OLLAMA_LLM_MODEL:-llama3:8b}
      - OLLAMA_EMBED_MODEL=${OLLAMA_EMBED_MODEL:-nomic-embed-text}
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-opencase}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-changeme}
      - MINIO_BUCKET=opencase
      - MINIO_USE_SSL=false
      - OPENCASE_OTEL_ENABLED=${OPENCASE_OTEL_ENABLED:-false}
      - OPENCASE_OTEL_EXPORTER=${OPENCASE_OTEL_EXPORTER:-console}
      - OPENCASE_OTEL_ENDPOINT=${OPENCASE_OTEL_ENDPOINT:-http://grafana:4318}
      - OPENCASE_OTEL_SERVICE_NAME=${OPENCASE_OTEL_SERVICE_NAME:-opencase-api}
      - OPENCASE_OTEL_SAMPLE_RATE=${OPENCASE_OTEL_SAMPLE_RATE:-1.0}
      # Admin seed (lifespan hook — runs once on startup, idempotent)
      - OPENCASE_ADMIN_EMAIL=${OPENCASE_ADMIN_EMAIL:-}
      - OPENCASE_ADMIN_PASSWORD=${OPENCASE_ADMIN_PASSWORD:-}
      - OPENCASE_ADMIN_FIRST_NAME=${OPENCASE_ADMIN_FIRST_NAME:-Admin}
      - OPENCASE_ADMIN_LAST_NAME=${OPENCASE_ADMIN_LAST_NAME:-User}
      - OPENCASE_ADMIN_FIRM_NAME=${OPENCASE_ADMIN_FIRM_NAME:-Default Firm}
    depends_on:
      db-migrate:
        condition: service_completed_successfully
      # redis, qdrant, minio, ollama dependencies added as each feature is implemented
    networks:
      - opencase
    restart: unless-stopped

  # --- Observability (traces + metrics + logs) -------------
  grafana:
    image: grafana/otel-lgtm:latest
    ports:
      - "3001:3000"    # Grafana UI
      - "4317:4317"    # OTLP gRPC receiver
      - "4318:4318"    # OTLP HTTP receiver
    volumes:
      - grafana-data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - opencase
    restart: unless-stopped

  # --- Document Object Storage ------------------------------
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    expose:
      - "9000"
      - "9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ACCESS_KEY:-opencase}
      - MINIO_ROOT_PASSWORD=${MINIO_SECRET_KEY:-changeme}
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - opencase
    restart: unless-stopped

  # --- Local LLM + Embeddings ------------------------------
  ollama:
    image: ollama/ollama:latest
    expose:
      - "11434"
    volumes:
      - ollama-models:/root/.ollama
    networks:
      - opencase
    restart: unless-stopped
    # GPU support: uncomment below for NVIDIA GPU acceleration
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  # --- Relational Database ----------------------------------
  postgres:
    image: postgres:17-alpine
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-opencase}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-changeme}
      - POSTGRES_DB=${POSTGRES_DB:-opencase}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-opencase}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - opencase
    restart: unless-stopped

  # --- Vector Store -----------------------------------------
  qdrant:
    image: qdrant/qdrant:latest
    expose:
      - "6333"
    volumes:
      - qdrant-data:/qdrant/storage
    networks:
      - opencase
    restart: unless-stopped

  # --- Task Queue Broker ------------------------------------
  redis:
    image: redis:7-alpine
    expose:
      - "6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - opencase
    restart: unless-stopped

  # --- Background Workers -----------------------------------
  celery-worker:
    build:
      context: ../backend
      dockerfile: Dockerfile
    command: celery -A app.workers worker -l info
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - REDIS_URL=redis://redis:6379/0
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - OLLAMA_HOST=http://ollama:11434
      - OLLAMA_EMBED_MODEL=${OLLAMA_EMBED_MODEL:-nomic-embed-text}
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-opencase}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-changeme}
      - MINIO_BUCKET=opencase
      - MINIO_USE_SSL=false
      - DEPLOYMENT_MODE=${DEPLOYMENT_MODE:-airgapped}
      # Cloud ingestion (internet mode only)
      - AZURE_CLIENT_ID=${AZURE_CLIENT_ID:-}
      - AZURE_CLIENT_SECRET=${AZURE_CLIENT_SECRET:-}
      - AZURE_TENANT_ID=${AZURE_TENANT_ID:-}
    volumes:
      - celery-tmp:/tmp/celery
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - opencase
    restart: unless-stopped

  celery-beat:
    build:
      context: ../backend
      dockerfile: Dockerfile
    command: celery -A app.workers beat -l info
    environment:
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - opencase
    restart: unless-stopped

volumes:
  postgres-data:
  qdrant-data:
  redis-data:
  ollama-models:
  minio-data:
  celery-tmp:
  grafana-data:

networks:
  opencase:
    driver: bridge
