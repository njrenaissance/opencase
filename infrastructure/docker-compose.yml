# Load environment from project root:
#   docker compose -f infrastructure/docker-compose.yml --env-file .env up

name: gideon

services:

  # --- UI & Proxy -------------------------------------------
  # Disabled until frontend implementation begins. Re-enable by removing
  # the profiles line or running: docker compose --profile frontend up
  nextjs:
    profiles: [frontend]
    build:
      context: ../frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:3000/api
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - NEXTAUTH_URL=http://localhost:3000
      - FASTAPI_UPSTREAM=http://fastapi:8000
    depends_on:
      - fastapi
    networks:
      - gideon
    restart: unless-stopped

  # --- Database Migrations ------------------------------------
  # Runs `alembic upgrade head` then exits. Admin seeding has moved
  # to the FastAPI lifespan hook (GIDEON_ADMIN_* env vars).
  db-migrate:
    image: ghcr.io/njrenaissance/gideon/backend:${IMAGE_TAG:-latest}
    command: ["true"]
    environment:
      - GIDEON_DB_URL=postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      # AUTH_SECRET_KEY and S3 credentials are required because importing
      # app.core.config validates them, even though this container only
      # runs migrations.
      - GIDEON_AUTH_SECRET_KEY=${GIDEON_AUTH_SECRET_KEY}
      - GIDEON_S3_ACCESS_KEY=${GIDEON_S3_ACCESS_KEY:-gideon}
      - GIDEON_S3_SECRET_KEY=${GIDEON_S3_SECRET_KEY:-changeme}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - gideon
    restart: "no"

  # --- API Layer --------------------------------------------
  fastapi:
    image: ghcr.io/njrenaissance/gideon/backend:${IMAGE_TAG:-latest}
    expose:
      - "8000"
    # Host port mapping for local development and integration tests.
    # In production, remove this — FastAPI is never exposed on a public port;
    # all external traffic routes through Next.js.
    ports:
      - "8000:8000"
    environment:
      - GIDEON_API_HOST=${GIDEON_API_HOST:-0.0.0.0}
      - GIDEON_API_PORT=${GIDEON_API_PORT:-8000}
      - GIDEON_LOG_LEVEL=${GIDEON_LOG_LEVEL:-INFO}
      - GIDEON_LOG_OUTPUT=${GIDEON_LOG_OUTPUT:-stdout}
      - GIDEON_DB_URL=postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - GIDEON_AUTH_SECRET_KEY=${GIDEON_AUTH_SECRET_KEY}
      - GIDEON_DEPLOYMENT_MODE=${DEPLOYMENT_MODE:-airgapped}
      - GIDEON_CELERY_BROKER_URL=redis://redis:6379/0
      - GIDEON_CELERY_RESULT_BACKEND=db+postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/gideon_tasks
      - REDIS_URL=redis://redis:6379/0
      # Embedding
      - GIDEON_EMBEDDING_MODEL=${GIDEON_EMBEDDING_MODEL:-nomic-embed-text}
      - GIDEON_EMBEDDING_BASE_URL=${GIDEON_EMBEDDING_BASE_URL:-http://ollama:11434}
      # Qdrant
      - GIDEON_QDRANT_HOST=${GIDEON_QDRANT_HOST:-qdrant}
      - GIDEON_QDRANT_PORT=${GIDEON_QDRANT_PORT:-6333}
      - GIDEON_QDRANT_COLLECTION=${GIDEON_QDRANT_COLLECTION:-gideon}
      # Chatbot / LLM inference
      - GIDEON_CHATBOT_MODEL=${GIDEON_CHATBOT_MODEL:-llama3}
      - GIDEON_CHATBOT_BASE_URL=${GIDEON_CHATBOT_BASE_URL:-http://ollama:11434}
      - GIDEON_CHATBOT_TEMPERATURE=${GIDEON_CHATBOT_TEMPERATURE:-0.1}
      - GIDEON_CHATBOT_MAX_TOKENS=${GIDEON_CHATBOT_MAX_TOKENS:-4096}
      - GIDEON_CHATBOT_RETRIEVAL_CHUNK_COUNT=${GIDEON_CHATBOT_RETRIEVAL_CHUNK_COUNT:-5}
      - GIDEON_CHATBOT_SYSTEM_PROMPT_FILE=${GIDEON_CHATBOT_SYSTEM_PROMPT_FILE:-/app/SYSTEM_PROMPT.md}
      - GIDEON_S3_ENDPOINT=${GIDEON_S3_ENDPOINT:-minio:9000}
      - GIDEON_S3_ACCESS_KEY=${GIDEON_S3_ACCESS_KEY:-gideon}
      - GIDEON_S3_SECRET_KEY=${GIDEON_S3_SECRET_KEY:-changeme}
      - GIDEON_S3_BUCKET=${GIDEON_S3_BUCKET:-gideon}
      - GIDEON_S3_USE_SSL=${GIDEON_S3_USE_SSL:-false}
      - GIDEON_S3_REGION=${GIDEON_S3_REGION:-us-east-1}
      - GIDEON_OTEL_ENABLED=${GIDEON_OTEL_ENABLED:-false}
      - GIDEON_OTEL_EXPORTER=${GIDEON_OTEL_EXPORTER:-console}
      - GIDEON_OTEL_ENDPOINT=${GIDEON_OTEL_ENDPOINT:-http://grafana:4318}
      - GIDEON_OTEL_SERVICE_NAME=${GIDEON_OTEL_SERVICE_NAME:-gideon-api}
      - GIDEON_OTEL_SAMPLE_RATE=${GIDEON_OTEL_SAMPLE_RATE:-1.0}
      # Admin seed (lifespan hook — runs once on startup, idempotent)
      - GIDEON_ADMIN_EMAIL=${GIDEON_ADMIN_EMAIL:-}
      - GIDEON_ADMIN_PASSWORD=${GIDEON_ADMIN_PASSWORD:-}
      - GIDEON_ADMIN_FIRST_NAME=${GIDEON_ADMIN_FIRST_NAME:-Admin}
      - GIDEON_ADMIN_LAST_NAME=${GIDEON_ADMIN_LAST_NAME:-User}
      - GIDEON_ADMIN_FIRM_NAME=${GIDEON_ADMIN_FIRM_NAME:-Default Firm}
    depends_on:
      db-migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      qdrant-init:
        condition: service_completed_successfully
      ollama-init:
        condition: service_completed_successfully
    networks:
      - gideon
    restart: unless-stopped

  # --- Observability (traces + metrics + logs) -------------
  grafana:
    image: grafana/otel-lgtm:latest
    ports:
      - "3001:3000"    # Grafana UI
      - "4317:4317"    # OTLP gRPC receiver
      - "4318:4318"    # OTLP HTTP receiver
    volumes:
      - grafana-data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - gideon
    restart: unless-stopped

  # --- Document Object Storage ------------------------------
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    expose:
      - "9000"
      - "9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=${GIDEON_S3_ACCESS_KEY:-gideon}
      - MINIO_ROOT_PASSWORD=${GIDEON_S3_SECRET_KEY:-changeme}
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - gideon
    restart: unless-stopped

  # One-shot init: create the default bucket if it does not exist.
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    environment:
      - MINIO_ROOT_USER=${GIDEON_S3_ACCESS_KEY:-gideon}
      - MINIO_ROOT_PASSWORD=${GIDEON_S3_SECRET_KEY:-changeme}
      - MINIO_BUCKET=${GIDEON_S3_BUCKET:-gideon}
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD;
      mc mb --ignore-existing local/$$MINIO_BUCKET;
      "
    networks:
      - gideon
    restart: "no"

  # --- Document Text Extraction -------------------------------
  tika:
    image: apache/tika:3.1.0.0
    expose:
      - "9998"
    healthcheck:
      test: ["CMD", "perl", "-e", "use IO::Socket::INET; my $$s = IO::Socket::INET->new(PeerAddr=>'localhost',PeerPort=>9998,Proto=>'tcp',Timeout=>2) or exit 1; print $$s \"GET /tika HTTP/1.0\\r\\nHost: localhost\\r\\n\\r\\n\"; my $$r = <$$s>; exit($$r =~ /200/ ? 0 : 1);"]
      start_period: 30s
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - gideon
    restart: unless-stopped

  # --- Local LLM + Embeddings ------------------------------
  ollama:
    image: ollama/ollama:latest
    expose:
      - "11434"
    ports:
      - "11434:11434"
    volumes:
      - ollama-models:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - gideon
    restart: unless-stopped
    # GPU support: uncomment below for NVIDIA GPU acceleration
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  # One-shot init: pull the embedding model and LLM inference model.
  ollama-init:
    image: ollama/ollama:latest
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - EMBEDDING_MODEL=${GIDEON_EMBEDDING_MODEL:-nomic-embed-text}
      - CHATBOT_MODEL=${GIDEON_CHATBOT_MODEL:-llama3}
      # Optional: comma-separated list of additional models to pre-pull.
      # These are stored in the ollama-models volume and survive restarts.
      # Example: GIDEON_ADDITIONAL_MODELS=mistral,qwen3:8b
      - ADDITIONAL_MODELS=${GIDEON_ADDITIONAL_MODELS:-}
    entrypoint: >
      /bin/sh -c "
      pull_if_missing() {
        model=$$1;
        if ollama list | grep -q \"^$$model \"; then
          echo \"Model $$model already exists — skipping pull.\";
        else
          echo \"Pulling model $$model...\";
          ollama pull $$model;
          echo \"Done: $$model\";
        fi;
      };
      echo 'Checking embedding model $$EMBEDDING_MODEL...';
      pull_if_missing $$EMBEDDING_MODEL;
      echo 'Checking LLM model $$CHATBOT_MODEL...';
      pull_if_missing $$CHATBOT_MODEL;
      if [ -n \"$$ADDITIONAL_MODELS\" ]; then
        echo \"$$ADDITIONAL_MODELS\" | tr ',' '\n' | while IFS= read -r model; do
          model=$$(echo \"$$model\" | tr -d ' ');
          [ -z \"$$model\" ] && continue;
          echo \"Checking additional model $$model...\";
          pull_if_missing $$model;
        done;
      fi;
      echo 'All model checks complete.';
      "
    networks:
      - gideon
    restart: "no"

  # --- Relational Database ----------------------------------
  postgres:
    image: postgres:17-alpine
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-gideon}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-changeme}
      - POSTGRES_DB=${POSTGRES_DB:-gideon}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-gideon}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - gideon
    restart: unless-stopped

  # --- Vector Store -----------------------------------------
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "${QDRANT_PORT:-6333}:6333"
      - "${QDRANT_GRPC_PORT:-6334}:6334"
    volumes:
      - qdrant-data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/6333'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - gideon
    restart: unless-stopped

  # One-shot init: create the default Qdrant collection if it does not exist.
  qdrant-init:
    image: curlimages/curl:latest
    depends_on:
      qdrant:
        condition: service_healthy
    environment:
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - COLLECTION_NAME=${GIDEON_QDRANT_COLLECTION:-gideon}
      - EMBEDDING_DIMENSIONS=${GIDEON_EMBEDDING_DIMENSIONS:-768}
    entrypoint:
      - /bin/sh
      - -c
      - |
        echo "Checking collection $$COLLECTION_NAME..."
        HTTP_CODE=$$(curl -sf -o /dev/null -w '%{http_code}' http://$$QDRANT_HOST:$$QDRANT_PORT/collections/$$COLLECTION_NAME)
        if [ "$$HTTP_CODE" = "200" ]; then
          echo "Collection already exists — skipping."; exit 0
        fi
        echo "Creating collection (dimensions=$$EMBEDDING_DIMENSIONS)..."
        curl -sf -X PUT "http://$$QDRANT_HOST:$$QDRANT_PORT/collections/$$COLLECTION_NAME" -H "Content-Type: application/json" -d "{\"vectors\":{\"size\":$$EMBEDDING_DIMENSIONS,\"distance\":\"Cosine\"}}" || exit 1
        echo "Done."
    networks:
      - gideon
    restart: "no"

  # --- Task Queue Broker ------------------------------------
  redis:
    image: redis:7-alpine
    expose:
      - "6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - gideon
    restart: unless-stopped

  # --- Background Workers -----------------------------------
  celery-worker:
    image: ghcr.io/njrenaissance/gideon/backend:${IMAGE_TAG:-latest}
    command: celery -A app.workers worker -l info
    environment:
      - SKIP_MIGRATIONS=true
      - GIDEON_AUTH_SECRET_KEY=${GIDEON_AUTH_SECRET_KEY}
      - GIDEON_DB_URL=postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - GIDEON_CELERY_BROKER_URL=redis://redis:6379/0
      - GIDEON_CELERY_RESULT_BACKEND=db+postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/gideon_tasks
      - GIDEON_CELERY_TASK_SOFT_TIME_LIMIT=${GIDEON_CELERY_TASK_SOFT_TIME_LIMIT:-300}
      - GIDEON_CELERY_TASK_HARD_TIME_LIMIT=${GIDEON_CELERY_TASK_HARD_TIME_LIMIT:-600}
      - GIDEON_CELERY_WORKER_CONCURRENCY=${GIDEON_CELERY_WORKER_CONCURRENCY:-2}
      - GIDEON_LOG_LEVEL=${GIDEON_LOG_LEVEL:-INFO}
      - GIDEON_LOG_OUTPUT=${GIDEON_LOG_OUTPUT:-stdout}
      - GIDEON_DEPLOYMENT_MODE=${DEPLOYMENT_MODE:-airgapped}
      # Embedding
      - GIDEON_EMBEDDING_MODEL=${GIDEON_EMBEDDING_MODEL:-nomic-embed-text}
      - GIDEON_EMBEDDING_BASE_URL=${GIDEON_EMBEDDING_BASE_URL:-http://ollama:11434}
      # Qdrant
      - GIDEON_QDRANT_HOST=${GIDEON_QDRANT_HOST:-qdrant}
      - GIDEON_QDRANT_PORT=${GIDEON_QDRANT_PORT:-6333}
      - GIDEON_QDRANT_COLLECTION=${GIDEON_QDRANT_COLLECTION:-gideon}
      - GIDEON_S3_ENDPOINT=${GIDEON_S3_ENDPOINT:-minio:9000}
      - GIDEON_S3_ACCESS_KEY=${GIDEON_S3_ACCESS_KEY:-gideon}
      - GIDEON_S3_SECRET_KEY=${GIDEON_S3_SECRET_KEY:-changeme}
      - GIDEON_S3_BUCKET=${GIDEON_S3_BUCKET:-gideon}
      - GIDEON_S3_USE_SSL=${GIDEON_S3_USE_SSL:-false}
      - GIDEON_S3_REGION=${GIDEON_S3_REGION:-us-east-1}
      # Document extraction (Tika)
      - GIDEON_EXTRACTION_TIKA_URL=${GIDEON_EXTRACTION_TIKA_URL:-http://tika:9998}
      # Cloud ingestion (internet mode only)
      - AZURE_CLIENT_ID=${AZURE_CLIENT_ID:-}
      - AZURE_CLIENT_SECRET=${AZURE_CLIENT_SECRET:-}
      - AZURE_TENANT_ID=${AZURE_TENANT_ID:-}
      # Observability
      - GIDEON_OTEL_ENABLED=${GIDEON_OTEL_ENABLED:-false}
      - GIDEON_OTEL_EXPORTER=${GIDEON_OTEL_EXPORTER:-console}
      - GIDEON_OTEL_ENDPOINT=${GIDEON_OTEL_ENDPOINT:-http://grafana:4318}
      - GIDEON_OTEL_SERVICE_NAME=gideon-worker
      - GIDEON_OTEL_SAMPLE_RATE=${GIDEON_OTEL_SAMPLE_RATE:-1.0}
    volumes:
      - celery-tmp:/tmp/celery
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      tika:
        condition: service_healthy
      qdrant-init:
        condition: service_completed_successfully
      ollama-init:
        condition: service_completed_successfully
    networks:
      - gideon
    restart: unless-stopped

  celery-beat:
    image: ghcr.io/njrenaissance/gideon/backend:${IMAGE_TAG:-latest}
    command: celery -A app.workers beat -l info --schedule /tmp/celery/celerybeat-schedule
    environment:
      - SKIP_MIGRATIONS=true
      - GIDEON_AUTH_SECRET_KEY=${GIDEON_AUTH_SECRET_KEY}
      # GIDEON_DB_URL and S3 credentials are required because importing
      # app.core.config validates them, even though Beat only uses
      # broker_url and result_backend.
      - GIDEON_DB_URL=postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - GIDEON_S3_ACCESS_KEY=${GIDEON_S3_ACCESS_KEY:-gideon}
      - GIDEON_S3_SECRET_KEY=${GIDEON_S3_SECRET_KEY:-changeme}
      - GIDEON_CELERY_BROKER_URL=redis://redis:6379/0
      - GIDEON_CELERY_RESULT_BACKEND=db+postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/gideon_tasks
      - GIDEON_LOG_LEVEL=${GIDEON_LOG_LEVEL:-INFO}
      - GIDEON_LOG_OUTPUT=${GIDEON_LOG_OUTPUT:-stdout}
      # Observability
      - GIDEON_OTEL_ENABLED=${GIDEON_OTEL_ENABLED:-false}
      - GIDEON_OTEL_EXPORTER=${GIDEON_OTEL_EXPORTER:-console}
      - GIDEON_OTEL_ENDPOINT=${GIDEON_OTEL_ENDPOINT:-http://grafana:4318}
      - GIDEON_OTEL_SERVICE_NAME=gideon-beat
      - GIDEON_OTEL_SAMPLE_RATE=${GIDEON_OTEL_SAMPLE_RATE:-1.0}
    volumes:
      - celery-tmp:/tmp/celery
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - gideon
    restart: unless-stopped

  # --- Monitoring --------------------------------------------
  flower:
    image: ghcr.io/njrenaissance/gideon/backend:${IMAGE_TAG:-latest}
    command: celery -A app.workers flower --port=5555 --url_prefix=/flower --broker_api=redis://redis:6379/0
    ports:
      - "${GIDEON_FLOWER_PORT:-5555}:5555"
    environment:
      - SKIP_MIGRATIONS=true
      - GIDEON_AUTH_SECRET_KEY=${GIDEON_AUTH_SECRET_KEY}
      # Required by app.core.config validation even though Flower only
      # uses broker_url and result_backend.
      - GIDEON_DB_URL=postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - GIDEON_S3_ACCESS_KEY=${GIDEON_S3_ACCESS_KEY:-gideon}
      - GIDEON_S3_SECRET_KEY=${GIDEON_S3_SECRET_KEY:-changeme}
      - GIDEON_CELERY_BROKER_URL=redis://redis:6379/0
      - GIDEON_CELERY_RESULT_BACKEND=db+postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/gideon_tasks
      - GIDEON_FLOWER_PORT=5555
      - GIDEON_FLOWER_BASIC_AUTH=${GIDEON_FLOWER_BASIC_AUTH:-}
      - GIDEON_FLOWER_URL_PREFIX=/flower
      - GIDEON_LOG_LEVEL=${GIDEON_LOG_LEVEL:-INFO}
      - GIDEON_LOG_OUTPUT=${GIDEON_LOG_OUTPUT:-stdout}
      # Flower is a monitoring UI — no task telemetry to emit.
      - GIDEON_OTEL_ENABLED=false
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - gideon
    restart: unless-stopped

volumes:
  postgres-data:
    external: true
    name: gideon-postgres-data
  qdrant-data:
    external: true
    name: gideon-qdrant-data
  redis-data:
  ollama-models:
    external: true
    name: gideon-ollama-models
  minio-data:
  celery-tmp:
  grafana-data:

networks:
  gideon:
    driver: bridge
