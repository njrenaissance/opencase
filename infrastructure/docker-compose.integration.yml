# Compose override for integration test runs.
#
# Applied automatically by pytest-docker (conftest.py).
# Do NOT use this file for normal development — use docker-compose.yml only.
#
# Changes from base:
#   - Points FastAPI at opencase_test database (created by postgres/init.sql)
#   - Exposes Redis port for host-side test access
#   - Points celery-worker result backend at opencase_tasks_test database
#   - Disables services not yet implemented (nextjs, minio, ollama, qdrant)
#     so pytest-docker only starts postgres + redis + fastapi + workers + grafana
#   - Tears down with -v so the test database is wiped between runs

services:
  fastapi:
    environment:
      - OPENCASE_DB_URL=postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/opencase_test
      - OPENCASE_CELERY_RESULT_BACKEND=db+postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/opencase_tasks_test
      - OPENCASE_OTEL_ENABLED=true
      - OPENCASE_OTEL_EXPORTER=otlp
      - OPENCASE_OTEL_ENDPOINT=http://grafana:4318
      - OPENCASE_OTEL_SERVICE_NAME=opencase-api
      - OPENCASE_OTEL_SAMPLE_RATE=1.0

  redis:
    ports:
      - "6379:6379"

  celery-worker:
    environment:
      - OPENCASE_DB_URL=postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/opencase_test
      - OPENCASE_CELERY_RESULT_BACKEND=db+postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/opencase_tasks_test
      - OPENCASE_OTEL_ENABLED=true
      - OPENCASE_OTEL_EXPORTER=otlp
      - OPENCASE_OTEL_ENDPOINT=http://grafana:4318
      - OPENCASE_OTEL_SERVICE_NAME=opencase-worker

  celery-beat:
    environment:
      - OPENCASE_CELERY_RESULT_BACKEND=db+postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/opencase_tasks_test
      - OPENCASE_OTEL_ENABLED=true
      - OPENCASE_OTEL_EXPORTER=otlp
      - OPENCASE_OTEL_ENDPOINT=http://grafana:4318
      - OPENCASE_OTEL_SERVICE_NAME=opencase-beat

  # Services below are not yet implemented — exclude from integration test stack.
  # They will be removed from this list as each feature is built.
  # grafana (otel-lgtm) runs with defaults from docker-compose.yml — do NOT disable it.
  nextjs:
    profiles: [disabled]
  minio:
    profiles: [disabled]
  ollama:
    profiles: [disabled]
  qdrant:
    profiles: [disabled]
  flower:
    profiles: [disabled]
